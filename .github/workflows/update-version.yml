name: Update Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter version (e.g. 1.0.1)"
        required: true

jobs:
  update:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Update update.json
      shell: pwsh
      run: |
        $v = "${{ github.event.inputs.version }}"

        @{
          version = $v
          url = "https://github.com/MrPcGamerYT/AIM-X/releases/latest/download/AIM-X-Setup.exe"
        } | ConvertTo-Json -Compress | Set-Content update.json

    - name: Update installer version
      shell: pwsh
      run: |
        (Get-Content installer.iss) `
        -replace 'AppVersion=.*', "AppVersion=$v" |
        Set-Content installer.iss

    - name: Commit changes
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add .
        git commit -m "Update version ${{ github.event.inputs.version }}" || echo "No changes"
        git push

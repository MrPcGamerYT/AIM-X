name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Read version
    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }

        echo "VERSION=$v" >> $env:GITHUB_ENV
        echo "TAG=v$v" >> $env:GITHUB_ENV

    # Setup tools
    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    # 🔥 BUILD PROJECT
    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select -First 1

        if (-not $proj) {
          Write-Error "No .csproj found!"
          exit 1
        }

        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    # 🔥 FIND EXE (NO HARD PATH)
    - name: Find EXE
      shell: pwsh
      run: |
        Write-Host "Searching for EXE..."

        $exe = Get-ChildItem -Recurse -Filter "*.exe" |
               Where-Object { $_.FullName -like "*bin\Release*" } |
               Select-Object -First 1

        if (-not $exe) {
          Write-Error "❌ No EXE found"
          exit 1
        }

        Write-Host "✅ Found EXE: $($exe.FullName)"
        echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

    # 🔥 BUILD INSTALLER
    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    # 🔥 FIND INSTALLER (NO HARD PATH)
    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*.exe" |
                 Where-Object { $_.Name -like "*Setup*" } |
                 Select-Object -First 1

        if (-not $setup) {
          Write-Error "❌ Installer not found"
          exit 1
        }

        Write-Host "✅ Installer: $($setup.FullName)"
        echo "SETUP_PATH=$($setup.FullName)" >> $env:GITHUB_ENV

    # 🔥 RELEASE
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: ${{ env.SETUP_PATH }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

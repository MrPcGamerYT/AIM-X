name: Build and Release (Ultimate)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    # =========================
    # BUILD
    # =========================
    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release /m

    # =========================
    # OBFUSCATION (FIXED)
    # =========================
    - name: Obfuscate EXE
      shell: pwsh
      run: |
        dotnet tool install --global Obfuscar.GlobalTool
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

        $releaseDir = Get-ChildItem -Recurse -Directory |
          Where-Object { $_.FullName -match "\\bin\\Release" } |
          Select-Object -First 1

        $releasePath = $releaseDir.FullName
        Write-Host "Release: $releasePath"

        $exeFile = Get-ChildItem $releasePath -Filter "*.exe" | Select-Object -First 1
        $exeName = $exeFile.Name

        $framework = Get-ChildItem "C:\Program Files\dotnet\packs\Microsoft.WindowsDesktop.App.Ref" `
          -Recurse -Filter "System.Windows.Forms.dll" |
          Select-Object -First 1

        $frameworkDir = $framework.Directory.FullName
        Write-Host "Framework: $frameworkDir"

        $config = @"
        <?xml version='1.0'?>
        <Obfuscator>
          <Var name='InPath' value='$releasePath' />
          <Var name='OutPath' value='$releasePath\Obfuscated' />
          <Var name='ExtraFrameworkFolders' value='$frameworkDir' />
        
          <Var name='KeepPublicApi' value='true' />
          <Var name='HidePrivateApi' value='true' />
        
          <Var name='RenameFields' value='false' />
          <Var name='RenameProperties' value='false' />
          <Var name='RenameEvents' value='false' />
          <Var name='UseUnicodeNames' value='false' />
        
          <Module file='$($exeFile.FullName)' />
        </Obfuscator>
        "@

        Set-Content obfuscar.xml $config

        obfuscar.console obfuscar.xml

        if (-not (Test-Path "$releasePath\Obfuscated\$exeName")) {
          Write-Error "Obfuscation failed"
          exit 1
        }

        Copy-Item "$releasePath\Obfuscated\$exeName" "$releasePath\$exeName" -Force

    # =========================
    # INSTALLER
    # =========================
    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    # =========================
    # FIND SETUP
    # =========================
    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
        if (-not $setup) { exit 1 }
        echo "SETUP_PATH=$($setup.FullName)" >> $env:GITHUB_ENV

    # =========================
    # RELEASE
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: AIM X Release
        files: ${{ env.SETUP_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

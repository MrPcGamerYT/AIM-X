name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }
        echo "VERSION=$v" >> $env:GITHUB_ENV
        echo "TAG=v$v" >> $env:GITHUB_ENV

    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select -First 1
        if (-not $proj) { Write-Error "No .csproj found!"; exit 1 }
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    - name: Obfuscate EXE
      shell: pwsh
      run: |
        dotnet tool install --global Obfuscar.GlobalTool
        $exeFile = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.FullName -like "*bin\Release*" -and $_.Name -notlike "*vshost*" } | Select -First 1
        if (-not $exeFile) { Write-Error "Could not find Release EXE"; exit 1 }
        $exeDir = $exeFile.DirectoryName
        $exeName = $exeFile.Name
        
        # Fixed XML Generation to avoid YAML syntax errors
        $xmlConfig = "<?xml version='1.0'?><Obfuscator><Var name='InPath' value='$exeDir' /><Var name='OutPath' value='$exeDir\Obfuscated' /><Var name='KeepPublicApi' value='false' /><Var name='HidePrivateApi' value='true' /><Var name='RenameProperties' value='true' /><Var name='RenameEvents' value='true' /><Var name='RenameFields' value='true' /><Var name='UseUnicodeNames' value='true' /><Module file='$exeName' /></Obfuscator>"
        $xmlConfig | Out-File -FilePath "obfuscar.xml" -Encoding utf8

        obfuscar.console obfuscar.xml
        $obfuscatedExe = Join-Path "$exeDir\Obfuscated" $exeName
        if (Test-Path $obfuscatedExe) {
            Move-Item -Path $obfuscatedExe -Destination $exeFile.FullName -Force
            Write-Host "✅ Scrambled: $exeName"
        } else {
            Write-Error "❌ Obfuscation failed"
            exit 1
        }

    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.Name -like "*Setup*" } | Select -First 1
        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }
        echo "SETUP_PATH=$($setup.FullName)" >> $env:GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: ${{ env.SETUP_PATH }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

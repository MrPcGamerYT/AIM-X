name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Read version
    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }
        echo "VERSION=$v" >> $env:GITHUB_ENV
        echo "TAG=v$v" >> $env:GITHUB_ENV

    # Setup tools
    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    # 🔥 BUILD PROJECT
    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select -First 1
        if (-not $proj) { Write-Error "No .csproj found!"; exit 1 }
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    # 🛡️ THE SINGLE STEP: MAXIMUM PROTECTION (OBFUSCATION)
    - name: Obfuscate EXE
      shell: pwsh
      run: |
        # 1. Install Obfuscar Global Tool
        dotnet tool install --global Obfuscar.GlobalTool

        # 2. Find the raw EXE
        $exeFile = Get-ChildItem -Recurse -Filter "*.exe" | 
                   Where-Object { $_.FullName -like "*bin\Release*" } | 
                   Select-Object -First 1
        
        $exeDir = $exeFile.DirectoryName
        $exeName = $exeFile.Name

        # 3. Create Obfuscar Configuration
        $config = @"
        <?xml version='1.0'?>
        <Obfuscator>
          <Var name="InPath" value="$exeDir" />
          <Var name="OutPath" value="$exeDir\Obfuscated" />
          <Var name="KeepPublicApi" value="false" />
          <Var name="HidePrivateApi" value="true" />
          <Var name="RenameProperties" value="true" />
          <Var name="RenameEvents" value="true" />
          <Var name="RenameFields" value="true" />
          <Var name="UseUnicodeNames" value="true" />
          <Module path="$exeName" />
        </Obfuscator>
        "@
        Set-Content -Path "obfuscar.xml" -Value $config

        # 4. Run Protection
        obfuscar.console obfuscar.xml

        # 5. Replace the original EXE with the Protected one for the Installer
        Move-Item -Path "$exeDir\Obfuscated\$exeName" -Destination "$exeDir\$exeName" -Force
        Write-Host "✅ EXE successfully protected and scrambled!"

    # 🔥 BUILD INSTALLER
    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    # 🔥 FIND INSTALLER
    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*.exe" |
                 Where-Object { $_.Name -like "*Setup*" } |
                 Select-Object -First 1

        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }
        echo "SETUP_PATH=$($setup.FullName)" >> $env:GITHUB_ENV

    # 🔥 RELEASE
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: ${{ env.SETUP_PATH }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

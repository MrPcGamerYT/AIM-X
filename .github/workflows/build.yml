name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else { $v = "1.0.0.0" }
        echo "VERSION=$v" >> $env:GITHUB_ENV
        echo "TAG=v$v" >> $env:GITHUB_ENV

    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select -First 1
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    - name: Obfuscate EXE
      shell: pwsh
      run: |
        dotnet tool install --global Obfuscar.GlobalTool
        
        # 1. Find the EXE inside bin\Release
        $exeFile = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.FullName -like "*bin\Release*" -and $_.Name -notlike "*vshost*" } | Select -First 1
        if (-not $exeFile) { Write-Error "❌ EXE not found in bin\Release"; exit 1 }
        
        $exeDir = $exeFile.DirectoryName
        $exeName = $exeFile.Name
        
        # 2. Create the XML directly IN the EXE directory to avoid path errors
        $xmlContent = "<?xml version='1.0'?><Obfuscator><Var name='InPath' value='.' /><Var name='OutPath' value='.\Obfuscated' /><Var name='KeepPublicApi' value='false' /><Var name='HidePrivateApi' value='true' /><Var name='RenameProperties' value='true' /><Var name='RenameEvents' value='true' /><Var name='RenameFields' value='true' /><Var name='UseUnicodeNames' value='true' /><Module file='$exeName' /></Obfuscator>"
        $xmlPath = Join-Path $exeDir "obfuscar.xml"
        $xmlContent | Out-File -FilePath $xmlPath -Encoding utf8

        # 3. Change directory to the EXE folder and run Obfuscar
        Push-Location $exeDir
        obfuscar.console obfuscar.xml
        Pop-Location

        # 4. Move the scrambled EXE back to the original Release folder
        $obfuscatedExe = Join-Path "$exeDir\Obfuscated" $exeName
        if (Test-Path $obfuscatedExe) {
            Move-Item -Path $obfuscatedExe -Destination $exeFile.FullName -Force
            Write-Host "✅ Success! EXE Scrambled."
        } else {
            Write-Error "❌ Obfuscation failed - Output not found"
            exit 1
        }

    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*.exe" | Where-Object { $_.Name -like "*Setup*" } | Select -First 1
        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }
        echo "SETUP_PATH=$($setup.FullName)" >> $env:GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: ${{ env.SETUP_PATH }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }
        Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$v"
        Add-Content -Path $env:GITHUB_ENV -Value "TAG=v$v"

    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if (-not $proj) { Write-Error "No .csproj found!"; exit 1 }
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    - name: Obfuscate EXE
      shell: pwsh
      run: |
        # install tool
        dotnet tool install --global Obfuscar.GlobalTool
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

        # find built exe with absolute path
        $exeFile = Get-ChildItem -Recurse -Filter "*.exe" |
                   Where-Object { $_.DirectoryName -match "\\bin\\Release" } |
                   Select-Object -First 1

        if (-not $exeFile) { Write-Error "❌ No built EXE found in Release folders"; exit 1 }

        $absExePath = $exeFile.FullName
        $absExeDir = $exeFile.Directory.FullName
        $exeName = $exeFile.Name

        Write-Host "Found EXE at $absExePath"

        # generate config with absolute paths
        $config = @"
        <?xml version='1.0'?>
        <Obfuscator>
        <Var name='InPath' value='$absExeDir' />
        <Var name='OutPath' value='$absExeDir\Obfuscated' />
        <Module file='$absExePath' />
        </Obfuscator>
        "@

        Set-Content -Path "obfuscar.xml" -Value $config

        # run obfuscar
        obfuscar.console (Resolve-Path obfuscar.xml).Path

        # check output
        if (-not (Test-Path "$absExeDir\Obfuscated\$exeName")) {
            Write-Error "❌ Obfuscated EXE not found — Obfuscar likely failed"; exit 1
        }

        Move-Item -Path "$absExeDir\Obfuscated\$exeName" -Destination "$absExeDir\$exeName" -Force
        Write-Host "✅ EXE successfully protected!"

    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*Setup*.exe" |
                 Select-Object -First 1
        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }
        Add-Content -Path $env:GITHUB_ENV -Value "SETUP_PATH=$($setup.FullName)"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: "${{ env.SETUP_PATH }}"
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

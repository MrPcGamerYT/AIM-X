name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Read version
    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }

        echo "VERSION=$v" >> $env:GITHUB_ENV
        echo "TAG=v$v" >> $env:GITHUB_ENV

    # Setup tools
    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    # 🔥 BUILD USING .CSPROJ (IMPORTANT FIX)
    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select -First 1

        if (-not $proj) {
          Write-Error "No .csproj found!"
          exit 1
        }

        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    # Check build output
    - name: Check Output
      shell: pwsh
      run: |
        if (!(Test-Path "AIM-X\bin\Release")) {
          Write-Error "Build failed - no output folder"
          exit 1
        }

    # Build installer
    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    # Release
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM-X ${{ env.TAG }}
        files: setup_output/AIM-X-Setup.exe
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
            $json = Get-Content update.json | ConvertFrom-Json
            $v = $json.version
        } else {
            $v = "1.0.0.0"
        }
        Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$v"
        Add-Content -Path $env:GITHUB_ENV -Value "TAG=v$v"

    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if (-not $proj) { Write-Error "No .csproj found!"; exit 1 }
        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release

    - name: Obfuscate EXE
      shell: pwsh
      run: |
        # Install Obfuscar global tool
        dotnet tool install --global Obfuscar.GlobalTool

        # Add .NET global tools path
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

        # Find the EXE
        $exeFile = Get-ChildItem -Recurse -Filter "*.exe" |
                   Where-Object { $_.FullName -like "*bin\Release*" } |
                   Select-Object -First 1

        if (-not $exeFile) { Write-Error "❌ No EXE found in bin\Release"; exit 1 }

        $exeDir = $exeFile.DirectoryName
        $exeName = $exeFile.Name

        # Create Obfuscar config
        $config = @'
        <?xml version="1.0"?>
        <Obfuscator>
        <Var name="InPath" value="{0}" />
        <Var name="OutPath" value="{0}\Obfuscated" />
        <Var name="KeepPublicApi" value="false" />
        <Var name="HidePrivateApi" value="true" />
        <Var name="RenameProperties" value="true" />
        <Var name="RenameEvents" value="true" />
        <Var name="RenameFields" value="true" />
        <Var name="UseUnicodeNames" value="true" />
        <Module path="{1}" />
        </Obfuscator>
        '@ -f $exeDir, $exeName

        Set-Content -Path "obfuscar.xml" -Value $config

        # Run Obfuscar
        obfuscar.console obfuscar.xml

        # Replace original EXE
        Move-Item -Path "$exeDir\Obfuscated\$exeName" -Destination "$exeDir\$exeName" -Force
        Write-Host "✅ EXE successfully protected and scrambled!"

    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*.exe" |
                 Where-Object { $_.Name -like "*Setup*" } |
                 Select-Object -First 1
        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }
        Add-Content -Path $env:GITHUB_ENV -Value "SETUP_PATH=$($setup.FullName)"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: "${{ env.SETUP_PATH }}"
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}

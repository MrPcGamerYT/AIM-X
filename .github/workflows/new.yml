name: Build and Release (Ultimate)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    # =========================
    # CHECKOUT
    # =========================
    - uses: actions/checkout@v4

    # =========================
    # CACHE NUGET (⚡ SPEED)
    # =========================
    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    # =========================
    # READ VERSION
    # =========================
    - name: Read version
      shell: pwsh
      run: |
        if (Test-Path update.json) {
          $json = Get-Content update.json | ConvertFrom-Json
          $v = $json.version
        } else {
          $v = "1.0.0.0"
        }
        Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$v"
        Add-Content -Path $env:GITHUB_ENV -Value "TAG=v$v"

    # =========================
    # SETUP TOOLS
    # =========================
    - uses: microsoft/setup-msbuild@v2
    - uses: NuGet/setup-nuget@v1

    # =========================
    # BUILD PROJECT (⚡ PARALLEL)
    # =========================
    - name: Build Project
      shell: pwsh
      run: |
        $proj = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -First 1
        if (-not $proj) { Write-Error "❌ No .csproj found"; exit 1 }

        nuget restore $proj.FullName
        msbuild $proj.FullName /p:Configuration=Release /m

    # =========================
    # OBFUSCATE EXE + DLLs 🔥
    # =========================
    - name: Obfuscate All Assemblies
      shell: pwsh
      run: |
        dotnet tool install --global Obfuscar.GlobalTool
        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

        # Find Release folder
        $releaseDir = Get-ChildItem -Recurse -Directory |
                      Where-Object { $_.FullName -match "\\bin\\Release" } |
                      Select-Object -First 1

        if (-not $releaseDir) { Write-Error "❌ Release folder not found"; exit 1 }

        $releasePath = $releaseDir.FullName
        Write-Host "✅ Release folder: $releasePath"

        # Find main EXE
        $exeFile = Get-ChildItem $releasePath -Filter "*.exe" | Select-Object -First 1
        if (-not $exeFile) { Write-Error "❌ EXE not found"; exit 1 }

        $exeName = $exeFile.Name

        # 🔥 Get framework path
        $frameworkDll = Get-ChildItem "C:\Program Files\dotnet\packs\Microsoft.WindowsDesktop.App.Ref" `
                          -Recurse -Filter "System.Windows.Forms.dll" `
                          | Select-Object -First 1

        if (-not $frameworkDll) { Write-Error "❌ Framework not found"; exit 1 }

        $frameworkPath = $frameworkDll.Directory.FullName

        # 🔥 Build module list (EXE + DLLs)
        $modules = ""
        Get-ChildItem $releasePath -Filter "*.dll" | ForEach-Object {
          $modules += "<Module file='$($_.FullName)' />`n"
        }

        $modules += "<Module file='$($exeFile.FullName)' />"

        # 🔥 Advanced Obfuscar config
        $config = @"
        <?xml version='1.0'?>
        <Obfuscator>
          <Var name='InPath' value='$releasePath' />
          <Var name='OutPath' value='$releasePath\Obfuscated' />
          <Var name='ExtraFrameworkFolders' value='$frameworkPath' />
        
          <Var name='KeepPublicApi' value='false' />
          <Var name='HidePrivateApi' value='true' />
          <Var name='RenameProperties' value='true' />
          <Var name='RenameEvents' value='true' />
          <Var name='RenameFields' value='true' />
          <Var name='UseUnicodeNames' value='true' />
          <Var name='SuppressIldasm' value='true' />
        
          $modules
        </Obfuscator>
        "@

        Set-Content obfuscar.xml $config

        # Run obfuscation
        obfuscar.console obfuscar.xml

        # Validate
        if (-not (Test-Path "$releasePath\Obfuscated\$exeName")) {
          Write-Error "❌ Obfuscation failed"; exit 1
        }

        # Replace all files
        Copy-Item "$releasePath\Obfuscated\*" $releasePath -Recurse -Force

        Write-Host "🚀 FULL OBFUSCATION COMPLETE"

    # =========================
    # BUILD INSTALLER
    # =========================
    - name: Build Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer.iss

    # =========================
    # FIND INSTALLER
    # =========================
    - name: Find Installer
      shell: pwsh
      run: |
        $setup = Get-ChildItem -Recurse -Filter "*Setup*.exe" | Select-Object -First 1
        if (-not $setup) { Write-Error "❌ Installer not found"; exit 1 }

        Add-Content -Path $env:GITHUB_ENV -Value "SETUP_PATH=$($setup.FullName)"
        Write-Host "✅ Installer: $($setup.FullName)"

    # =========================
    # CREATE RELEASE
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: AIM X ${{ env.TAG }}
        files: "${{ env.SETUP_PATH }}"
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ github.token }}
